<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منصة سهلناها - أدوات PDF</title>
    
    <!-- إعدادات التطبيق الاحترافية -->
    <meta name="theme-color" content="#6b21a8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="سهلناها">
    
    <!-- ربط ملف التعريف داخلياً ليعمل خيار "فتح كتطبيق" -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIm1vbnNhdCBzYWhsZW5uYWhhIiwKICAic2hvcnRfbmFtZSI6ICJzYWhsZW5uYWhhIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiM2YjIxYTgiLAogICJ0aGVtZV9jb2xvciI6ICIjNmIyMWE4Igp9">

    <!-- المكتبات -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: #f8f9fa; 
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
        }
        .purple-header {
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
            padding-top: env(safe-area-inset-top, 20px);
        }
        .tool-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .tool-card.active {
            border: 3px solid #fbbf24;
            transform: translateY(-5px);
            background: white;
        }
        /* منع ظهور قائمة السياق عند الضغط الطويل */
        * { -webkit-touch-callout: none; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="purple-header text-white pb-24 text-center shadow-xl relative">
        <div class="max-w-4xl mx-auto px-6 pt-10">
            <h1 class="text-3xl font-bold">منصة سهلناها</h1>
            <p class="opacity-80 text-sm mt-1">تطبيق الأدوات التعليمية الشامل</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto -mt-12 px-4 relative z-10">
        <!-- القائمة الرئيسية -->
        <div class="grid grid-cols-3 gap-3 mb-8">
            <button onclick="switchTool('merge')" id="btn-merge" class="tool-card active p-4 rounded-3xl shadow-lg flex flex-col items-center">
                <span class="text-3xl mb-1">📸</span>
                <span class="text-[10px] font-bold text-purple-900">تجميع صور</span>
            </button>
            <button onclick="switchTool('split')" id="btn-split" class="tool-card p-4 rounded-3xl shadow-lg flex flex-col items-center opacity-80">
                <span class="text-3xl mb-1">📄</span>
                <span class="text-[10px] font-bold text-purple-900">فك PDF</span>
            </button>
            <button onclick="switchTool('compress')" id="btn-compress" class="tool-card p-4 rounded-3xl shadow-lg flex flex-col items-center opacity-80">
                <span class="text-3xl mb-1">📉</span>
                <span class="text-[10px] font-bold text-purple-900">ضغط PDF</span>
            </button>
        </div>

        <!-- أداة الدمج -->
        <section id="sec-merge">
            <div class="bg-white p-10 rounded-[2.5rem] border-2 border-dashed border-purple-200 text-center shadow-md">
                <input type="file" id="imgInput" multiple accept="image/*" class="hidden" onchange="loadImgs(event)">
                <label for="imgInput" class="cursor-pointer block">
                    <div class="bg-purple-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <span class="text-2xl text-purple-600 font-bold">+</span>
                    </div>
                    <div class="font-bold text-gray-800">إضافة صور الدروس</div>
                </label>
            </div>
            
            <div id="mergeToolbar" class="mt-6 flex justify-between items-center hidden bg-white p-4 rounded-2xl shadow-md border border-purple-50">
                <span class="text-purple-700 font-bold text-sm">عدد الصور: <span id="imgCount">0</span></span>
                <button onclick="makePDF()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold shadow-md">تحويل لـ PDF</button>
            </div>
            
            <div id="preview" class="grid grid-cols-2 gap-4 mt-6"></div>
        </section>

        <!-- أداة الفك -->
        <section id="sec-split" class="hidden">
            <div class="bg-white p-10 rounded-[2.5rem] border-2 border-dashed border-blue-200 text-center shadow-md">
                <input type="file" id="pdfInput" accept="application/pdf" class="hidden" onchange="pdfToImg(event)">
                <label for="pdfInput" class="cursor-pointer block">
                    <div class="bg-blue-50 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <span class="text-2xl">📂</span>
                    </div>
                    <div class="font-bold text-gray-800">اختر ملف PDF</div>
                </label>
            </div>
            <div id="pdfOutput" class="grid grid-cols-2 gap-4 mt-8"></div>
        </section>

        <!-- أداة الضغط -->
        <section id="sec-compress" class="hidden text-center py-20 bg-white rounded-[2.5rem]">
            <p class="text-gray-400 font-bold">ميزة الضغط ستتوفر في التحديث القادم</p>
        </section>
    </main>

    <!-- شاشة التحميل -->
    <div id="loader" class="fixed inset-0 bg-purple-900/50 backdrop-blur-sm flex items-center justify-center z-[100] hidden">
        <div class="bg-white p-8 rounded-3xl text-center">
            <div class="w-10 h-10 border-4 border-purple-600 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            <p class="font-bold text-gray-700">جاري المعالجة...</p>
        </div>
    </div>

    <script>
        let imgs = [];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        function switchTool(t) {
            ['merge', 'split', 'compress'].forEach(x => {
                document.getElementById('sec-'+x).classList.add('hidden');
                document.getElementById('btn-'+x).classList.remove('active', 'opacity-100');
                if(x !== t) document.getElementById('btn-'+x).classList.add('opacity-80');
            });
            document.getElementById('sec-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('active', 'opacity-100');
        }

        function loadImgs(e) {
            const files = e.target.files;
            Array.from(files).forEach(f => {
                const r = new FileReader();
                r.onload = (ex) => { imgs.push(ex.target.result); render(); };
                r.readAsDataURL(f);
            });
        }

        function render() {
            const g = document.getElementById('preview');
            const t = document.getElementById('mergeToolbar');
            g.innerHTML = '';
            if(imgs.length > 0) t.classList.remove('hidden');
            document.getElementById('imgCount').innerText = imgs.length;
            imgs.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = 'relative bg-white p-2 rounded-2xl shadow-sm border border-gray-100';
                d.innerHTML = `<img src="${s}" class="w-full h-32 object-cover rounded-xl shadow-inner">
                <button onclick="imgs.splice(${i},1);render()" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shadow-md">×</button>`;
                g.appendChild(d);
            });
        }

        async function makePDF() {
            if(imgs.length === 0) return;
            document.getElementById('loader').classList.remove('hidden');
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                for(let i=0; i<imgs.length; i++) {
                    if(i>0) doc.addPage();
                    doc.addImage(imgs[i], 'JPEG', 10, 10, 190, 270);
                }
                doc.save('سهلناها_تجميع.pdf');
            } catch (err) { alert('خطأ في التحويل'); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }

        async function pdfToImg(e) {
            const f = e.target.files[0];
            if(!f) return;
            document.getElementById('loader').classList.remove('hidden');
            try {
                const b = await f.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({data: b}).promise;
                const out = document.getElementById('pdfOutput');
                out.innerHTML = '';
                for(let i=1; i<=pdf.numPages; i++) {
                    const p = await pdf.getPage(i);
                    const v = p.getViewport({scale: 1.5});
                    const c = document.createElement('canvas');
                    const ctx = c.getContext('2d');
                    c.height = v.height; c.width = v.width;
                    await p.render({canvasContext: ctx, viewport: v}).promise;
                    const imgUrl = c.toDataURL('image/jpeg', 0.8);
                    const d = document.createElement('div');
                    d.className = 'bg-white p-3 rounded-2xl shadow-sm text-center border';
                    d.innerHTML = `<img src="${imgUrl}" class="w-full rounded-xl mb-3 shadow-inner"><a href="${imgUrl}" download="Sahlennaha_${i}.jpg" class="inline-block bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold">حفظ</a>`;
                    out.appendChild(d);
                }
            } catch (err) { alert('خطأ في قراءة PDF'); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        }
    </script>
</body>
</html>
